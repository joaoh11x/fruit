<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pêra — Validações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FBF6E9;
    --cream-deep: #F1E9D3;
    --pear-skin: #C9D96B;
    --pear-skin-light: #E9F0A0;
    --leaf-green: #5C7A3E;
    --leaf-dark: #3F5A2A;
    --russet: #A8623A;
    --russet-light: #C98356;
    --core-brown: #3B2F22;
    --gold: #E8C468;
    --gold-deep: #C99A38;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100vh;
    background: radial-gradient(circle at 50% -10%, var(--cream-deep) 0%, var(--cream) 55%);
    font-family: 'Outfit', sans-serif;
    color: var(--core-brown);
    overflow-x:hidden;
  }

  .bg-orchard{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .blob{
    position:absolute;
    border-radius:45% 55% 60% 40% / 55% 45% 55% 45%;
    filter: blur(2px);
    opacity:.35;
    animation: float 14s ease-in-out infinite alternate;
  }
  .blob.b1{ width:220px; height:260px; top:-60px; left:-70px; background:radial-gradient(circle at 35% 25%, var(--pear-skin-light), var(--pear-skin) 70%); animation-duration:16s; }
  .blob.b2{ width:160px; height:190px; top:60%; right:-60px; background:radial-gradient(circle at 35% 25%, var(--pear-skin-light), var(--pear-skin) 70%); animation-duration:19s; }
  .blob.b3{ width:120px; height:140px; bottom:-40px; left:8%; background:radial-gradient(circle at 35% 25%, var(--gold), var(--russet-light) 70%); opacity:.22; animation-duration:13s; }
  .blob.b4{ width:90px; height:110px; top:12%; right:14%; background:radial-gradient(circle at 35% 25%, var(--pear-skin-light), var(--leaf-green) 80%); opacity:.18; animation-duration:21s; }

  @keyframes float{
    from{ transform: translateY(0px) rotate(0deg); }
    to{ transform: translateY(30px) rotate(8deg); }
  }

  .stage{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 48px 20px 32px;
    gap: 28px;
  }

  .hero{
    text-align:center;
    max-width:520px;
  }
  .eyebrow{
    font-family:'Outfit', sans-serif;
    font-size:.72rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color: var(--leaf-dark);
    margin:0 0 10px;
    font-weight:600;
    opacity:.75;
  }
  .title{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size: clamp(3rem, 9vw, 4.6rem);
    margin:0;
    color: var(--core-brown);
    line-height:1;
    letter-spacing:-.01em;
  }
  .title::after{
    content:"";
    display:block;
    width:52px;
    height:3px;
    margin: 16px auto 0;
    border-radius:2px;
    background: linear-gradient(90deg, var(--leaf-green), var(--pear-skin));
  }
  .subtitle{
    margin: 16px auto 0;
    max-width: 380px;
    font-size: .98rem;
    line-height:1.5;
    color: var(--core-brown);
    opacity:.68;
  }

  .card{
    position:relative;
    background: linear-gradient(180deg, #ffffff, var(--cream));
    border-radius: 32px;
    padding: 36px 34px 30px;
    width: min(92vw, 400px);
    box-shadow:
      0 1px 1px rgba(59,47,34,.04),
      0 20px 44px -18px rgba(59,47,34,.22),
      0 0 0 1px rgba(59,47,34,.05) inset;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 6px;
  }

  .pear-wrap{
    position:relative;
    width: 208px;
    height: 258px;
    margin-bottom: 6px;
  }
  .pear-svg{
    width:100%;
    height:100%;
    display:block;
    transform-origin: 50% 85%;
    filter: drop-shadow(0 18px 20px rgba(90,110,40,.28));
  }

  @keyframes bounce{
    0%{ transform: scale(1,1); }
    28%{ transform: scale(1.09, 0.90); }
    55%{ transform: scale(0.95, 1.06); }
    78%{ transform: scale(1.03, 0.98); }
    100%{ transform: scale(1,1); }
  }
  .pear-svg.bounce{ animation: bounce .55s cubic-bezier(.36,.07,.19,.97); }

  @keyframes shrink{ to{ transform: scale(.18) rotate(-10deg); opacity:.15; } }
  .pear-svg.shrink{ animation: shrink .32s ease-in forwards; }

  @keyframes regrow{
    from{ transform: scale(.18) rotate(-10deg); opacity:.15; }
    60%{ transform: scale(1.08) rotate(2deg); opacity:1; }
    to{ transform: scale(1) rotate(0deg); opacity:1; }
  }
  .pear-svg.regrow{ animation: regrow .6s cubic-bezier(.34,1.56,.64,1); }

  .counter-overlay{
    position:absolute;
    top: 60%;
    left:50%;
    transform: translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    pointer-events:none;
  }
  .counter-label{
    font-size:.62rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-weight:600;
    color: var(--leaf-dark);
    opacity:.7;
    margin-bottom:2px;
  }
  .counter-number{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 3.1rem;
    line-height:1;
    color: var(--core-brown);
    text-shadow: 0 2px 0 rgba(255,255,255,.5);
  }
  @keyframes pop{
    0%{ transform: scale(1); }
    45%{ transform: scale(1.28); color: var(--gold-deep); }
    100%{ transform: scale(1); }
  }
  .counter-number.pop{ animation: pop .45s cubic-bezier(.34,1.56,.64,1); }

  .field-label{
    font-size:.92rem;
    font-weight:600;
    color: var(--core-brown);
    opacity:.75;
    margin: 6px 0 4px;
    text-align:center;
  }

  .actions{
    display:flex;
    gap:12px;
    margin-top: 14px;
    width:100%;
    flex-wrap: wrap;
    justify-content:center;
  }

  .btn{
    font-family:'Outfit', sans-serif;
    font-weight:600;
    font-size: .95rem;
    border:none;
    cursor:pointer;
    border-radius: 999px;
    padding: 13px 26px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
  }
  .btn:active{ transform: scale(.95); }
  .btn:focus-visible{ outline: 3px solid var(--gold); outline-offset:2px; }

  .btn-primary{
    background: linear-gradient(135deg, var(--leaf-green), var(--leaf-dark));
    color: var(--cream);
    box-shadow: 0 10px 22px -8px rgba(63,90,42,.55);
  }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 14px 26px -8px rgba(63,90,42,.6); }

  .btn-ghost{
    background: transparent;
    color: var(--core-brown);
    border: 1.5px solid rgba(59,47,34,.28);
  }
  .btn-ghost:hover{ background: rgba(59,47,34,.06); }

  .status{
    min-height: 1.3em;
    margin-top: 16px;
    font-size: .85rem;
    color: var(--leaf-dark);
    opacity:.85;
    text-align:center;
    transition: opacity .2s ease;
  }

  .footnote{
    position:relative;
    z-index:1;
    font-size:.78rem;
    color: var(--core-brown);
    opacity:.45;
    letter-spacing:.02em;
  }

  .seed{
    position:fixed;
    width:9px;
    height:9px;
    background: var(--leaf-green);
    border-radius: 55% 45% 60% 40%;
    pointer-events:none;
    z-index: 5;
    animation: seedFly .85s ease-out forwards;
  }
  @keyframes seedFly{
    0%{ transform: translate(0,0) rotate(0deg) scale(1); opacity:1; }
    100%{ transform: translate(var(--tx), var(--ty)) rotate(220deg) scale(.3); opacity:0; }
  }

  @media (max-width: 420px){
    .card{ padding: 30px 22px 26px; }
    .actions{ flex-direction:column; }
    .btn{ width:100%; justify-content:center; }
  }

  @media (prefers-reduced-motion: reduce){
    .blob, .pear-svg.bounce, .pear-svg.shrink, .pear-svg.regrow, .counter-number.pop, .seed{
      animation: none !important;
    }
  }
</style>
</head>
<body>

  <div class="bg-orchard" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>

  <main class="stage">
    <header class="hero">
      <p class="eyebrow">doce, firme, no ponto</p>
      <h1 class="title">Pêra</h1>
      <p class="subtitle">Cada clique é uma pêra madura sendo conferida e colhida com cuidado do pomar.</p>
    </header>

    <section class="card" aria-label="Contador de validações">
      <div class="pear-wrap">
        <svg class="pear-svg" viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="pearSkinGrad" cx="35%" cy="24%" r="85%">
              <stop offset="0%" stop-color="#EEF3AE"/>
              <stop offset="45%" stop-color="var(--pear-skin)"/>
              <stop offset="100%" stop-color="#8CA23C"/>
            </radialGradient>
            <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6B4B30"/>
              <stop offset="100%" stop-color="#3B2A1A"/>
            </linearGradient>
            <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="var(--leaf-green)"/>
              <stop offset="100%" stop-color="var(--leaf-dark)"/>
            </linearGradient>
            <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="5"/>
            </filter>
          </defs>

          <!-- stem -->
          <rect x="113" y="2" width="11" height="28" rx="5.5" fill="url(#stemGrad)" transform="rotate(-10 118 16)"/>

          <!-- leaf -->
          <path d="M122,22 C133,4 156,-2 172,9 C176,22 165,38 149,34 C138,31 125,29 122,22 Z" fill="url(#leafGrad)"/>
          <path d="M130,20 C142,14 155,14 165,18" stroke="#2E441E" stroke-width="1.4" fill="none" opacity=".5" stroke-linecap="round"/>

          <!-- pear body -->
          <path d="M120,20
                   C95,20 85,54 90,80
                   C55,90 25,132 25,186
                   C25,246 65,292 120,292
                   C175,292 215,246 215,186
                   C215,132 185,90 150,80
                   C155,54 145,20 120,20 Z"
                fill="url(#pearSkinGrad)"/>

          <!-- shading toward base -->
          <path d="M120,20
                   C95,20 85,54 90,80
                   C55,90 25,132 25,186
                   C25,246 65,292 120,292
                   C175,292 215,246 215,186
                   C215,132 185,90 150,80
                   C155,54 145,20 120,20 Z"
                fill="url(#pearSkinGrad)" opacity="0"/>
          <path d="M40,190 C40,240 75,280 120,282 C165,280 200,240 200,190 C200,250 160,286 120,286 C80,286 40,250 40,190 Z"
                fill="var(--leaf-dark)" opacity=".16"/>

          <!-- russet blush spots -->
          <ellipse cx="165" cy="215" rx="26" ry="18" fill="var(--russet)" opacity=".32" filter="url(#softBlur)" transform="rotate(18 165 215)"/>
          <ellipse cx="95" cy="245" rx="18" ry="12" fill="var(--russet)" opacity=".22" filter="url(#softBlur)" transform="rotate(-12 95 245)"/>
          <ellipse cx="140" cy="110" rx="12" ry="9" fill="var(--russet-light)" opacity=".25" filter="url(#softBlur)"/>

          <!-- gloss highlight -->
          <ellipse cx="78" cy="120" rx="22" ry="34" fill="#FFFFFF" opacity=".38" filter="url(#softBlur)"/>
        </svg>

        <div class="counter-overlay">
          <span class="counter-label">validações</span>
          <span class="counter-number" id="counterNumber">0</span>
        </div>
      </div>

      <p class="field-label">Quantidade validada das validações</p>

      <div class="actions">
        <button id="validateBtn" class="btn btn-primary" type="button">
          🍐 Validar
        </button>
        <button id="resetBtn" class="btn btn-ghost" type="button">
          Reiniciar
        </button>
      </div>

      <p class="status" id="statusMsg">Nenhuma pêra validada ainda.</p>
    </section>

    <p class="footnote">colhido à mão, contado com carinho</p>
  </main>

<script>
  (function(){
    let count = 0;

    const counterEl = document.getElementById('counterNumber');
    const statusEl = document.getElementById('statusMsg');
    const pearSvg = document.querySelector('.pear-svg');
    const validateBtn = document.getElementById('validateBtn');
    const resetBtn = document.getElementById('resetBtn');

    function messageFor(n){
      if(n === 0) return 'Nenhuma pêra validada ainda.';
      if(n % 25 === 0) return 'Cesta cheia! Pomar orgulhoso. 🧺';
      if(n < 5) return 'Bom começo, continue colhendo!';
      if(n < 10) return 'Ganhando ritmo na colheita.';
      if(n < 25) return 'Excelente! Colheita produtiva.';
      return n + ' pêras validadas com sucesso.';
    }

    function updateDisplay(){
      counterEl.textContent = count;
      statusEl.textContent = messageFor(count);
    }

    function restart(el, animClass){
      el.classList.remove(animClass);
      void el.offsetWidth;
      el.classList.add(animClass);
    }

    function burstSeeds(originEl){
      const rect = originEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * 0.55;
      const count = 9;
      for(let i = 0; i < count; i++){
        const seed = document.createElement('div');
        seed.className = 'seed';
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const dist = 60 + Math.random() * 50;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 30;
        seed.style.left = cx + 'px';
        seed.style.top = cy + 'px';
        seed.style.setProperty('--tx', tx + 'px');
        seed.style.setProperty('--ty', ty + 'px');
        seed.style.background = i % 2 === 0 ? 'var(--leaf-green)' : 'var(--gold)';
        document.body.appendChild(seed);
        setTimeout(() => seed.remove(), 900);
      }
    }

    validateBtn.addEventListener('click', function(){
      count++;
      updateDisplay();
      restart(pearSvg, 'bounce');
      restart(counterEl, 'pop');
      burstSeeds(pearSvg);
    });

    resetBtn.addEventListener('click', function(){
      if(count === 0) return;
      pearSvg.classList.remove('regrow');
      pearSvg.classList.add('shrink');
      setTimeout(function(){
        count = 0;
        updateDisplay();
        pearSvg.classList.remove('shrink');
        pearSvg.classList.add('regrow');
        setTimeout(() => pearSvg.classList.remove('regrow'), 650);
      }, 320);
    });

    updateDisplay();
  })();
</script>
</body>
</html>
